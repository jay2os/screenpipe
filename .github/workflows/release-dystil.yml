
name: Release Dystil

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: "Commit hash to build from (optional, defaults to latest on main)"
        required: false
      version:
        description: "Version to set in Cargo.toml (optional, e.g. 1.2.3)"
        required: false

concurrency:
  group: release-dystil-${{ github.sha }}
  cancel-in-progress: true

env:
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --features metal,parakeet-mlx,rfdetr-mlx,redact-onnx-coreml,official-build"
            os_type: "macos"
            artifact_arch: "arm64"
          - platform: macos-15
            target: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin --features metal,redact-onnx-coreml,official-build"
            os_type: "macos"
            artifact_arch: "x64"
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            tauri-args: "--target x86_64-pc-windows-msvc --features official-build,directml,redact-onnx-directml"
            os_type: "windows"
            artifact_arch: "x64"

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - name: Detect Xcode version and set Apple Intelligence feature
        if: matrix.os_type == 'macos'
        id: detect-xcode
        shell: bash
        run: |
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo "")
          SDK_SETTINGS="${SDK_PATH}/SDKSettings.json"
          if [ -f "$SDK_SETTINGS" ] && grep -q '"26\.' "$SDK_SETTINGS"; then
            echo "has_apple_intelligence=true" >> $GITHUB_OUTPUT
            echo "macOS 26+ SDK detected - Apple Intelligence enabled"
          elif [ -d "${SDK_PATH}/System/Library/Frameworks/FoundationModels.framework" ]; then
            echo "has_apple_intelligence=true" >> $GITHUB_OUTPUT
            echo "FoundationModels.framework found - Apple Intelligence enabled"
          else
            echo "has_apple_intelligence=false" >> $GITHUB_OUTPUT
            echo "macOS SDK < 26 - Apple Intelligence not available"
          fi

      - name: Enable Git long paths on Windows
        if: matrix.os_type == 'windows'
        shell: powershell
        run: |
          git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash || github.sha }}

      - name: Shorten target dir to avoid MAX_PATH (Windows)
        if: matrix.os_type == 'windows'
        shell: powershell
        run: |
          $targetDir = "apps\dystil\src-tauri\target"
          $shortDir = "C:\t"
          if (Test-Path $shortDir) { Remove-Item -Recurse -Force $shortDir }
          New-Item -ItemType Directory -Force -Path $shortDir | Out-Null
          if (Test-Path $targetDir) { Remove-Item -Recurse -Force $targetDir }
          cmd /c mklink /J $targetDir $shortDir
          Write-Host "Created junction: $targetDir -> $shortDir"

      - name: Update version in Cargo.toml
        if: github.event.inputs.version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -n "$VERSION" ]]; then
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' apps/dystil/src-tauri/Cargo.toml
            echo "Updated version to $VERSION"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: dystil-${{ runner.os }}-rust-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          cache-directories: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/${{ matrix.target }}
            apps/dystil/src-tauri/target
          shared-key: "dystil-rust-cache-${{ matrix.target }}"
          save-if: true

      - name: Verify Cargo toolchain
        shell: bash
        run: |
          which cargo
          cargo --version

      - name: Install dependencies
        if: matrix.os_type == 'macos'
        shell: bash
        run: |
          eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null || /usr/local/bin/brew shellenv 2>/dev/null || true)"
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/sbin" >> $GITHUB_PATH
          brew install ffmpeg wget

      - name: Install frontend dependencies
        working-directory: ${{ github.workspace }}/apps/dystil
        run: bun install

      - name: Set up MSVC
        if: matrix.os_type == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download ONNX Runtime
        if: matrix.os_type == 'windows'
        shell: pwsh
        run: |
          $arch = 'x64'
          $version = '1.22.0'
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-$arch-$version.zip"
          $zipFile = "onnxruntime-win-$arch-$version.zip"
          $extractDir = "apps/dystil/src-tauri/onnxruntime-win-$arch-$version"
          Invoke-WebRequest -Uri $url -OutFile $zipFile
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          7z x $zipFile -o"apps/dystil/src-tauri/" -y
          Write-Host "ONNX Runtime extracted to $extractDir"
          Get-ChildItem "$extractDir/lib" | ForEach-Object { Write-Host $_.Name }

      - name: Run pre_build.js
        run: bun ./scripts/pre_build.js
        working-directory: ${{ github.workspace }}/apps/dystil
        env:
          SCREENPIPE_RELEASE_TARGET: ${{ matrix.target }}

      - name: Use production config for release
        shell: bash
        run: cp apps/dystil/src-tauri/tauri.prod.conf.json apps/dystil/src-tauri/tauri.conf.json

      - name: Set macOS deployment target
        if: matrix.os_type == 'macos'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV
            echo "Setting MACOSX_DEPLOYMENT_TARGET=14.0 for MLX Metal kernel support"
          else
            echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
            echo "Setting MACOSX_DEPLOYMENT_TARGET=10.15 for std::filesystem support"
          fi

      - name: Compute Tauri build args
        if: matrix.os_type == 'macos'
        id: tauri-args
        shell: bash
        run: |
          ARGS="${{ matrix.tauri-args }}"
          if [[ "${{ steps.detect-xcode.outputs.has_apple_intelligence }}" == "true" && "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            ARGS=$(echo "$ARGS" | sed 's/--features \([^ ]*\)/--features \1,apple-intelligence/')
            echo "Tauri build will include Apple Intelligence"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "Final tauri args: $ARGS"

      - name: Build (macOS) - unsigned
        if: matrix.os_type == 'macos'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: false
          SCREENPIPE_RELEASE_TARGET: ${{ matrix.target }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.target == 'aarch64-apple-darwin' && '14.0' || '10.15' }}
          CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.target == 'aarch64-apple-darwin' && '14.0' || '10.15' }}
          CFLAGS: ${{ matrix.target == 'aarch64-apple-darwin' && '-mmacosx-version-min=14.0 -mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8' || '-mmacosx-version-min=10.15' }}
          CXXFLAGS: ${{ matrix.target == 'aarch64-apple-darwin' && '-mmacosx-version-min=14.0 -mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8' || '-mmacosx-version-min=10.15' }}
          CMAKE_C_FLAGS: ${{ matrix.target == 'aarch64-apple-darwin' && '-mmacosx-version-min=14.0' || '-mmacosx-version-min=10.15' }}
          CMAKE_CXX_FLAGS: ${{ matrix.target == 'aarch64-apple-darwin' && '-mmacosx-version-min=14.0' || '-mmacosx-version-min=10.15' }}
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_INCREMENTAL: "false"
          CARGO_PROFILE_RELEASE_STRIP: none
          CARGO_PROFILE_RELEASE_PANIC: unwind
          CARGO_PROFILE_RELEASE_INCREMENTAL: "true"
        run: |
          TAURI_ARGS="${{ steps.tauri-args.outputs.args || matrix.tauri-args }}"
          MAX_ATTEMPTS=3
          TARGET="${{ matrix.target }}"
          BUNDLE_DIR="apps/dystil/src-tauri/target/${TARGET}/release/bundle"

          # Clean stale bundle artifacts
          echo "Cleaning stale bundle artifacts..."
          rm -rf "${BUNDLE_DIR}" 2>/dev/null || true

          # Clean cached mlx-sys build
          echo "Cleaning mlx-sys build cache..."
          find "apps/dystil/src-tauri/target/${TARGET}/release/build" -maxdepth 1 -name "mlx-sys-*" -exec rm -rf {} + 2>/dev/null || true

          # Force macOS 14.0 for aarch64 MLX Metal kernels
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            WRAPPER_DIR="$(pwd)/.compiler-wrapper"
            mkdir -p "$WRAPPER_DIR"
            for tool in cc c++ xcrun; do
              REAL_PATH=$(which $tool)
              printf '#!/bin/bash\nnew=(); for x in "$@"; do [[ "$x" == -mmacosx-version-min=* ]] && x="-mmacosx-version-min=14.0"; new+=("$x"); done; exec '"$REAL_PATH"' "${new[@]}"\n' > "$WRAPPER_DIR/$tool"
              chmod +x "$WRAPPER_DIR/$tool"
            done
            export PATH="$WRAPPER_DIR:$PATH"
            echo "Compiler wrappers installed: cc=$(which cc) c++=$(which c++) xcrun=$(which xcrun)"
          fi

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Build attempt $attempt/$MAX_ATTEMPTS ==="

            cd apps/dystil
            if bunx tauri build -v --no-sign $TAURI_ARGS 2>&1 | tee /tmp/tauri-build-$attempt.log; then
              echo "Build succeeded on attempt $attempt"
              cd ../..
              break
            fi
            cd ../..

            if [ $attempt -eq $MAX_ATTEMPTS ]; then
              echo "Build failed after $MAX_ATTEMPTS attempts"
              cat /tmp/tauri-build-$attempt.log | tail -50
              exit 1
            fi

            # Check if it's a transient failure (worth retrying)
            if grep -qiE "failed to sign|codesign.*failed|failed to bundle" /tmp/tauri-build-$attempt.log; then
              echo "Transient build failure detected, retrying..."
              find "$BUNDLE_DIR" -type f -delete 2>/dev/null || true
              sleep $((attempt * 30))
            else
              echo "Non-transient build failure, aborting"
              cat /tmp/tauri-build-$attempt.log | tail -50
              exit 1
            fi
          done

      - name: Build (Windows) - unsigned
        if: matrix.os_type == 'windows'
        working-directory: apps/dystil
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_INCREMENTAL: "true"
          CARGO_PROFILE_RELEASE_STRIP: none
          CARGO_PROFILE_RELEASE_PANIC: abort
          CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
          RUSTFLAGS: ""
          CFLAGS: '/arch:AVX2'
          CXXFLAGS: '/arch:AVX2'
          GGML_NATIVE: "OFF"
          GGML_AVX512: "OFF"
          GGML_AVX512_VBMI: "OFF"
          GGML_AVX512_VNNI: "OFF"
          GGML_AVX512_BF16: "OFF"
          CMAKE_ARGS: '-DGGML_NATIVE=OFF -DGGML_AVX512=OFF -DGGML_AVX512_VBMI=OFF -DGGML_AVX512_VNNI=OFF -DGGML_AVX512_BF16=OFF -DCMAKE_C_FLAGS=/arch:AVX2 -DCMAKE_CXX_FLAGS=/arch:AVX2'
          OPENBLAS_PATH: ${{ github.workspace }}/apps/dystil/src-tauri/openblas
        run: bunx tauri build --verbose --no-sign ${{ matrix.tauri-args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dystil-${{ matrix.artifact_arch }}-${{ matrix.os_type }}
          path: |
            apps/dystil/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/dystil/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            apps/dystil/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
            apps/dystil/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            apps/dystil/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            apps/dystil/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig
          retention-days: 5
          if-no-files-found: error

  release:
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash || github.sha }}
          fetch-depth: 1

      - name: Update version in Cargo.toml
        if: github.event.inputs.version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -n "$VERSION" ]]; then
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' apps/dystil/src-tauri/Cargo.toml
            echo "Updated version to $VERSION"
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version = ' apps/dystil/src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=dystil-v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dystil-*

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | head -50

      - name: Rename artifacts for release
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.version.outputs.version }}"

          # macOS ARM64
          for f in artifacts/*arm64*/*.dmg; do
            [ -f "$f" ] && cp "$f" "release-assets/dystil-${VERSION}-arm64.dmg"
          done
          for f in artifacts/*arm64*/*.tar.gz; do
            [ -f "$f" ] && cp "$f" "release-assets/"
          done
          for f in artifacts/*arm64*/*.sig; do
            [ -f "$f" ] && cp "$f" "release-assets/"
          done

          # macOS x64
          for f in artifacts/*x64-macos*/*.dmg; do
            [ -f "$f" ] && cp "$f" "release-assets/dystil-${VERSION}-x64.dmg"
          done
          for f in artifacts/*x64-macos*/*.tar.gz; do
            [ -f "$f" ] && cp "$f" "release-assets/"
          done
          for f in artifacts/*x64-macos*/*.sig; do
            [ -f "$f" ] && cp "$f" "release-assets/"
          done

          # Windows x64
          for f in artifacts/*x64-windows*/*.exe; do
            [ -f "$f" ] && cp "$f" "release-assets/dystil-${VERSION}-x64-setup.exe"
          done
          for f in artifacts/*x64-windows*/*.nsis.zip; do
            [ -f "$f" ] && cp "$f" "release-assets/"
          done
          for f in artifacts/*x64-windows*/*.sig; do
            [ -f "$f" ] && cp "$f" "release-assets/"
          done

          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          echo "Creating release: ${TAG}"

          gh release create "$TAG" \
            --title "Dystil v${VERSION}" \
            --notes "## Dystil v${VERSION}

          24/7 memory for your desktop. 100% local. You own your data.

          ### Downloads
          - **macOS (Apple Silicon):** dystil-${VERSION}-arm64.dmg
          - **macOS (Intel):** dystil-${VERSION}-x64.dmg
          - **Windows (x64):** dystil-${VERSION}-x64-setup.exe

          ### Notes
          - macOS builds are unsigned. Right-click > Open to bypass Gatekeeper.
          - Windows builds are unsigned. SmartScreen will show a warning." \
            --draft=false \
            --prerelease=false \
            release-assets/*
